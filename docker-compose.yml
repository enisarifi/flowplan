services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flowplan
      POSTGRES_PASSWORD: flowplan
      POSTGRES_DB: flowplan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowplan"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://flowplan:flowplan@db:5432/flowplan
      SECRET_KEY: dev-secret-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: llama-3.3-70b-versatile
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
